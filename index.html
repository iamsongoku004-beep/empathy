<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metro Empathy Phrasebook</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <button class="theme-toggle" id="themeToggle">🌙 Dark</button>
        <h1>Empathy</h1>
        <p>Empathy With Action - Acknowledge, Then Resolve</p>
        <div class="header-badge" id="headerBadge">82 Empathy Statements - 22 Categories</div>
    </div>

    <div class="search-container">
        <input type="text" class="search-box" id="searchBox" placeholder="Search phrases, categories, or keywords...">
        <div class="search-stats" id="searchStats">Showing all 82 phrases</div>
    </div>

    <div class="filter-container" id="filterContainer"></div>

    <div class="recent-section" id="recentSection">
        <div class="recent-title">Recently Used</div>
        <div class="recent-chips" id="recentChips"></div>
    </div>

    <div class="content" id="content"></div>

    <div class="footer">
        <strong>Metro by T-Mobile</strong> - Customer Care Excellence Toolkit
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">&#9989;</span>
        <span id="toastText">Copied to clipboard!</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
